<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Конвертер рецептів</title>
</head>
<body>
    <h1>Калькулятор ваги інгредієнтів</h1>

    <input type="number" id="volume-input" placeholder="Кількість (мл)">
    
  <select id="ingredient-select">
    <option value="борошно кукурудзяне">Борошно кукурудзяне</option>
    <option value="борошно пшеничне">Борошно пшеничне</option>
    <option value="варення">Варення</option>
    <option value="вершки (рідкі)">Вершки (рідкі)</option>
    <option value="вершкове масло (розтоплене)">Вершкове масло (розтоплене)</option>
    <option value="вівсяні пластівці">Вівсяні пластівці</option>
    <option value="вода">Вода</option>
    <option value="горіхи (мелені)">Горіхи (мелені)</option>
    <option value="гречка">Гречка</option>
    <option value="згущене молоко">Згущене молоко</option>
    <option value="йогурт (класичний)">Йогурт (класичний)</option>
    <option value="какао-порошок">Какао-порошок</option>
    <option value="кефір">Кефір</option>
    <option value="крохмаль">Крохмаль</option>
    <option value="майонез">Майонез</option>
    <option value="манна крупа">Манна крупа</option>
    <option value="мед (рідкий)">Мед (рідкий)</option>
    <option value="молоко цільне">Молоко цільне</option>
    <option value="олія рослинна">Олія рослинна</option>
    <option value="оцет">Оцет</option>
    <option value="пшоно">Пшоно</option>
    <option value="рис">Рис</option>
    <option value="родзинки">Родзинки</option>
    <option value="сир кисломолочний (творог)">Сир кисломолочний (творог)</option>
    <option value="сир твердий (тертий)">Сир твердий (тертий)</option>
    <option value="сіль (кухонна)">Сіль (кухонна)</option>
    <option value="сметана">Сметана</option>
    <option value="сухарі панірувальні">Сухарі панірувальні</option>
    <option value="томатна паста">Томатна паста</option>
    <option value="цукор">Цукор</option>
    <option value="цукрова пудра">Цукрова пудра</option>
</select>

    <button id="calc-button">Порахувати</button>

    <h2 id="result-text">Результат: 0 г</h2>

    <script type="module" src="js/app.js"></script>
</body>
</html>
